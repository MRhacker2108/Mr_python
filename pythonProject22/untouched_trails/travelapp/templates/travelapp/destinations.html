<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destinations | UntouchedTrails</title>
    <style>
        /* General Page Styling */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f7f6; }
        header { background-color: #004080; color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;}
        header a { color: white; text-decoration: none; font-weight: bold; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .page-title { text-align: center; color: #004080; font-size: 2.5rem; margin-bottom: 40px; }

        /* Perfect Alignment using CSS Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Premium Card Design */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }

        /* Image Container & Fallback */
        .card-img-container {
            width: 100%;
            height: 220px;
            position: relative;
            background-color: #e9ecef;
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Badge Styling (Now sits perfectly over the image) */
        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 2;
        }
        .badge-offbeat { background: #28a745; color: white; }
        .badge-famous { background: #004080; color: white; }

        /* Content Layout (Forces button to the bottom) */
        .card-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-content h3 { color: #004080; margin: 0 0 10px 0; font-size: 1.4rem; }
        .card-content p { color: #666; font-size: 0.95rem; line-height: 1.5; flex-grow: 1; margin-bottom: 20px; }
        .price { color: #dc3545; font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; }

        /* Button Styling */
        .btn-book {
            background-color: #28a745;
            color: white;
            display: block;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            border: none;
        }
        .btn-book:hover { background-color: #218838; }
    </style>
</head>
<body>

<header>
    <h2 style="margin: 0;">UntouchedTrails</h2>
    <a href="/">⬅ Back to Home</a>
</header>

<div class="container">
    <h1 class="page-title">Explore Exclusive Packages</h1>

    <div class="grid">
        {% for place in places %}
        <div class="card">

            <div class="card-img-container">
                <img src="{{ place.img }}" alt="{{ place.name }}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1506905925146-31b151659a5d?auto=format&fit=crop&w=800&q=80';">

                {% if place.cat == 'Untouched Offbeat' %}
                    <span class="badge badge-offbeat">🌿 {{ place.cat }}</span>
                {% else %}
                    <span class="badge badge-famous">📸 {{ place.cat }}</span>
                {% endif %}
            </div>

            <div class="card-content">
                <h3>{{ place.name }}</h3>
                <p>{{ place.desc }}</p>
                <div class="price">{{ place.price }}</div>
                <a href="/book/{{ place.id }}/" class="btn-book">View & Book</a>
            </div>

        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
