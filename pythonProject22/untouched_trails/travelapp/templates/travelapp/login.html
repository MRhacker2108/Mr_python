<!DOCTYPE html>
<html lang="en">
<head>

    </style>
</head>
<body>
    <div class="form-box">
        <h2 style="color: #004080;">Welcome Back</h2>
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">

        <p>Don't have an account? <a href="/register/">Register</a></p>
        <a href="/">⬅ Go to Home</a>
    </div>
</body>
</html>
